name: Looty Price Sync

on:
  schedule:
    # Runs at 00:00 and 12:00 UTC every day
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run Price Sync Script
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          TAB_NAME: "Other_Gadgets"
          GOOGLE_CREDS_JSON_CONTENT: ${{ secrets.GOOGLE_CREDS_JSON_CONTENT }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AMAZON_CLIENT_ID: ${{ secrets.AMAZON_CLIENT_ID }}
          AMAZON_CLIENT_SECRET: ${{ secrets.AMAZON_CLIENT_SECRET }}
          AMAZON_TAG: ${{ secrets.AMAZON_TAG }}
        run: |
          python sync_prices.py
